services:
  postgres:
    image: postgres:16-alpine
    container_name: workflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: workflow
      POSTGRES_PASSWORD: workflow
      POSTGRES_DB: workflow_portal
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U workflow -d workflow_portal']
      interval: 5s
      timeout: 5s
      retries: 10

  https:
    image: caddy:2.10.0
    container_name: workflow-https
    restart: unless-stopped
    profiles: ['https']
    env_file:
      - .env
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: workflow-tunnel
    restart: unless-stopped
    profiles: ['tunnel']
    command: tunnel --no-autoupdate --url http://host.docker.internal:80
    depends_on:
      - https

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
