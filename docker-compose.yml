services:
  postgres:
    image: postgres:16-alpine
    container_name: workflow-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: node:22-alpine
    container_name: workflow-api
    restart: unless-stopped
    profiles: ['core']
    working_dir: /workspace
    env_file:
      - .env
    environment:
      NODE_ENV: development
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @apps/api dev"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '127.0.0.1:3001:3001'
    volumes:
      - ./:/workspace
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3001/health >/dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  https:
    image: caddy:2.10.0
    container_name: workflow-https
    restart: unless-stopped
    profiles: ['https']
    env_file:
      - .env
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: workflow-tunnel
    restart: unless-stopped
    profiles: ['tunnel']
    command: tunnel --no-autoupdate --url http://host.docker.internal:80
    depends_on:
      - https

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
