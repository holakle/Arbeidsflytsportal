name: Generate route diagram

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install (optional)
        run: |
          # hvis du trenger deps; ellers kan du droppe dette
          true

      - name: Generate diagram
        run: node docs/flows/scripts/gen-routes-mermaid.mjs

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/flows/routes.generated.md
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore(diagram): update generated routes"
          git push
